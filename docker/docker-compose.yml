version: "3.9"

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: neo_postgres
    env_file:
      - ../.env
    ports:
      - "5434:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ../sql:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: neo_airflow_init
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://neo:neo_pass@postgres:5432/neo_invest
    depends_on:
      postgres:
        condition: service_healthy
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_USER:-admin}
      --password ${AIRFLOW_PASSWORD:-admin}
      --firstname Neo
      --lastname Invest
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: neo_airflow_webserver
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://neo:neo_pass@postgres:5432/neo_invest
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../sql:/opt/airflow/sql
    command: webserver

  airflow-scheduler:
    build:
      context: ..
      dockerfile: docker/airflow/Dockerfile
    container_name: neo_airflow_scheduler
    env_file:
      - ../.env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://neo:neo_pass@postgres:5432/neo_invest
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../src:/opt/airflow/src
      - ../sql:/opt/airflow/sql
    command: scheduler

  app:
    image: python:3.11-slim
    container_name: neo_app
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    volumes:
      - ../src:/app/src
      - ../requirements.txt:/app/requirements.txt
    command: >
      bash -c "pip install --no-cache-dir -r /app/requirements.txt &&
      python -m src.ingestion.fetch_history"

volumes:
  pg_data:
